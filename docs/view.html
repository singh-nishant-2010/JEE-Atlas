<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>View Note</title>

    <link rel="stylesheet" href="./style.css"/>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header style="padding:20px">
    <a href="./" style="color:#8bd5ff;text-decoration:none;">← Back</a>
    <h1 id="title" style="margin-top:10px;">Loading…</h1>
</header>

<main style="padding:20px">
    <div id="content"></div>
</main>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

function stripFrontmatter(md) {
  if (md.startsWith("---")) {
    const parts = md.split("---");
    if (parts.length >= 3) {
      return parts.slice(2).join("---").trim();
    }
  }
  return md;
}

const path = getParam("path");

if (!path) {
  document.getElementById("title").textContent = "Missing path";
  document.getElementById("content").textContent = "No markdown path provided.";
}
else {

  fetch("./" + path)
    .then(r => {
      if (!r.ok) {
        throw new Error("Markdown file not found: " + path);
      }
      return r.text();
    })

    .then(md => {

      md = stripFrontmatter(md);

      const titleMatch = md.match(/^#\s+(.+)$/m);

      if (titleMatch) {
        document.getElementById("title").textContent = titleMatch[1];
      }
      else {
        document.getElementById("title").textContent = path;
      }

      document.getElementById("content").innerHTML = marked.parse(md);
    })

    .catch(err => {
      document.getElementById("title").textContent = "Error loading note";
      document.getElementById("content").textContent = err.message;
    });
}
</script>

</body>
</html>

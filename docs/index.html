<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JEE Knowledge Base</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
</head>
<body>
<header>
    <div class="header-top">
        <h1>JEE Knowledge Base</h1>

        <div class="theme-switch">
            <span class="theme-ico sun" aria-hidden="true">☀</span>

            <label class="switch" title="Toggle theme">
                <input id="themeToggle" type="checkbox" aria-label="Toggle dark mode" />
                <span class="slider"></span>
            </label>

            <span class="theme-ico moon" aria-hidden="true">☾</span>
        </div>

        <div class="ai-launch">
            <select id="aiProvider" aria-label="Select AI app">
                <option value="chatgpt">ChatGPT</option>
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
                <option value="copilot">Copilot</option>
                <option value="perplexity">Perplexity</option>
            </select>

            <button id="askAiBtn" class="ask-ai" title="Open selected AI">
                <span class="ai-ico" aria-hidden="true">✨</span>
                ASK AI
            </button>
        </div>
    </div>

    <p>Physics • Chemistry • Maths • English • Computer Science</p>
</header>

<main class="grid">
    <section class="card">
        <h2>Search</h2>

        <div class="row">
            <input id="q" placeholder="Search topic, formula, concept…" />
        </div>

        <div class="row">
            <select id="subject">
                <option value="">All Subjects</option>
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Maths</option>
                <option>English</option>
                <option>Computer Science</option>
            </select>

            <select id="exam">
                <option value="">All Levels</option>
                <option>School</option>
                <option>JEE_Main</option>
                <option>JEE_Advanced</option>
            </select>
        </div>

        <div id="results"></div>
        <div id="pager" class="pager">
            <button id="prevBtn" disabled>← Prev</button>
            <span id="pageInfo" class="muted"></span>
            <button id="nextBtn" disabled>Next →</button>
        </div>
    </section>

    <section class="card">
        <h2>Add Content (Voice / Text)</h2>

        <div class="row">
            <select id="add_subject">
                <option>Physics</option><option>Chemistry</option><option>Maths</option>
                <option>English</option><option>Computer Science</option>
            </select>
            <input id="add_topic" placeholder="Topic path e.g. Mechanics/Laws of Motion" />
        </div>

        <div class="row">
            <select id="add_exam">
                <option>School</option>
                <option>JEE_Main</option>
                <option>JEE_Advanced</option>
            </select>
            <input id="add_tags" placeholder="tags: friction, fbd, newton" />
        </div>

        <div class="row">
            <input id="add_title" placeholder="Title e.g. Newton’s Laws" />
        </div>

        <div class="row">
            <button id="mic">🎙 Start Voice</button>
            <button id="stopMic" disabled>⏹ Stop</button>
        </div>

        <textarea id="add_body" rows="12" placeholder="Write your note in Markdown…"></textarea>

        <div class="row">
            <button id="gen">Generate Markdown</button>
            <button id="clearMd">Clear</button>
            <button id="openGithub" disabled>Open GitHub to Commit</button>
        </div>

        <pre id="mdPreview" class="preview"></pre>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
